<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tadawulx - ادعو أصدقاء</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e11; color: #ffffff; display: flex; justify-content: center;
            min-height: 100vh; user-select: none;
        }

        .app-container { width: 100%; max-width: 100%; background-color: #0b0e11; position: relative; display: flex; flex-direction: column; padding-bottom: 30px; }

        /* الهيدر العلوي */
        .top-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; font-size: 16px; font-weight: bold; border-bottom: 1px solid #1e2329; background-color: #181a20; }
        .top-header i { cursor: pointer; font-size: 18px; color: #fcd535; }

        /* بانر مكافآت الدعوة */
        .promo-banner { background-color: #181a20; border: 1px solid #2b3139; border-radius: 16px; margin: 15px; padding: 18px; text-align: right; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .banner-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .banner-tag { background: linear-gradient(90deg, #fcd535, #eec100); color: #000; font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: bold; white-space: nowrap; }
        .banner-title { font-size: 13px; color: #ffffff; font-weight: bold; }
        
        .banner-steps { display: flex; justify-content: space-around; align-items: center; gap: 15px; margin-top: 15px; }
        .step-box { text-align: center; flex: 1; cursor: pointer; transition: transform 0.2s; background: #0b0e11; padding: 12px 5px; border-radius: 12px; border: 1px solid #2b3139; }
        .step-box:active { transform: scale(0.95); border-color: #fcd535; }
        .step-box i { font-size: 20px; color: #fcd535; margin-bottom: 8px; display: inline-block; }
        .step-text { font-size: 11px; color: #fff; display: block; font-weight: bold; }

        /* حاوية الواجهة الشفافة للباركود */
        .qr-section-wrapper { position: relative; margin: 10px 15px 25px; display: flex; justify-content: center; align-items: center; }

        /* الخلفية الذهبية المتحركة خلف الباركود */
        .golden-animated-bg {
            padding: 12px;
            border-radius: 18px;
            background: linear-gradient(45deg, #ffdf00, #d4af37, #8a5a19, #fcd535, #ffdf00);
            background-size: 400% 400%;
            animation: goldenShine 5s ease infinite;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4), inset 0 0 10px rgba(255,255,255,0.6);
            display: inline-block;
        }

        @keyframes goldenShine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* مربع الباركود */
        .qr-box {
            background-color: #ffffff;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 170px;
            height: 170px;
        }
        .qr-box img { width: 100%; height: 100%; object-fit: contain; display: block; transition: opacity 0.3s; }

        /* كروت الإدخال والنسخ */
        .inputs-card { background-color: #181a20; border: 1px solid #2b3139; border-radius: 16px; margin: 0 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .input-group { margin-bottom: 18px; text-align: right; }
        .input-label { font-size: 13px; color: #848e9c; margin-bottom: 8px; display: block; padding-right: 5px; font-weight: bold; }
        .copy-box { background-color: #0b0e11; border: 1px solid #2b3139; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; cursor: pointer; transition: all 0.2s; }
        .copy-box:active { transform: scale(0.98); border-color: #fcd535; }
        .copy-text { font-size: 13px; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: ltr; max-width: 80%; font-weight: bold; }
        .copy-icon { color: #fcd535; font-size: 18px; }

        /* أزرار المشاركة */
        .share-title { text-align: center; font-size: 13px; color: #848e9c; margin: 20px 0 12px; font-weight: bold; }
        .share-icons { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .share-btn { width: 42px; height: 42px; border-radius: 50%; background-color: #0b0e11; border: 1px solid #2b3139; display: flex; justify-content: center; align-items: center; color: #ffffff; font-size: 18px; cursor: pointer; transition: all 0.2s; }
        .share-btn:active { transform: scale(0.9); background-color: #1e2329; color: #fcd535; }
        .share-btn.whatsapp { color: #25D366; }
        .share-btn.telegram { color: #0088cc; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #02c076; color: #fff; padding: 12px 25px; border-radius: 20px; font-size: 13px; font-weight: bold; z-index: 2000; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .toast.show { transform: translateX(-50%) translateY(0); }
        /* ---------------- القائمة السفلية ---------------- */
.bottom-nav { 
    position: fixed; 
    bottom: 0; 
    left: 0; 
    width: 100%; 
    background-color: #000000; 
    display: flex; 
    justify-content: space-around; 
    padding: 10px 0 15px; 
    border-top: 1px solid #2b3139; 
    z-index: 100; 
    direction: ltr; /* هذا السطر هو الذي يعكس الترتيب من اليسار لليمين */
}
.nav-item { display: flex; flex-direction: column; align-items: center; color: #848e9c; font-size: 11px; gap: 6px; font-weight: bold; text-decoration: none; }
.nav-item.active { color: #fcd535; }
.nav-item i { font-size: 20px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="top-header">
            <i class="fa-solid fa-chevron-right" onclick="history.back()"></i>
            <span>ادعو أصدقاء</span>
            <div style="width: 18px;"></div>
        </div>

        <div class="promo-banner">
            <div class="banner-header-row">
                <div class="banner-title">بناء فريق والحصول على مكافآت سخية</div>
                <div class="banner-tag">مكافآت وكيل المنصة</div>
            </div>
            
            <div class="banner-steps">
                <div class="step-box" onclick="shareTo('telegram')">
                    <i class="fa-solid fa-paper-plane"></i>
                    <span class="step-text">إرسال الرابط (تليجرام)</span>
                </div>
                <div class="step-box" onclick="checkCommissions()">
                    <i class="fa-solid fa-bell"></i>
                    <span class="step-text">إشعارات العمولات</span>
                </div>
            </div>
        </div>

        <div class="qr-section-wrapper">
            <div class="golden-animated-bg">
                <div class="qr-box">
                    <img id="qr-image" src="" alt="QR Code">
                </div>
            </div>
        </div>

        <div class="inputs-card">
            <div class="input-group">
                <span class="input-label">رابط الدعوة المباشر</span>
                <div class="copy-box" onclick="copyContent('link-text', 'تم نسخ رابط الدعوة بنجاح!')">
                    <i class="fa-regular fa-copy copy-icon"></i>
                    <span class="copy-text" id="link-text"></span>
                </div>
            </div>

            <div class="input-group">
                <span class="input-label">رمز الدعوة الخاص بك</span>
                <div class="copy-box" onclick="copyContent('code-text', 'تم نسخ رمز الدعوة بنجاح!')">
                    <i class="fa-regular fa-copy copy-icon"></i>
                    <span class="copy-text" id="code-text"></span>
                </div>
            </div>

            <div class="share-title">مشاركة الرابط عبر</div>
            <div class="share-icons">
                <div class="share-btn whatsapp" onclick="shareTo('whatsapp')"><i class="fa-brands fa-whatsapp"></i></div>
                <div class="share-btn telegram" onclick="shareTo('telegram')"><i class="fa-brands fa-telegram"></i></div>
                <div class="share-btn" onclick="shareTo('twitter')"><i class="fa-brands fa-x-twitter"></i></div>
                <div class="share-btn" onclick="shareTo('facebook')"><i class="fa-brands fa-facebook-f"></i></div>
            </div>
        </div>

    </div>

    <div class="toast" id="copy-toast">تم بنجاح!</div>
    <div class="bottom-nav">
    <a href="home.html" class="nav-item">
        <i class="fa-solid fa-house"></i>
        <span data-ar="بيت" data-en="Home">بيت</span>
    </a>
    <a href="quantify.html" class="nav-item ">
        <i class="fa-solid fa-bolt"></i>
        <span data-ar="تحديد الكمية" data-en="Quantify">تحديد الكمية</span>
    </a>
    <a href="invite.html" class="nav-item active">
        <i class="fa-solid fa-share-from-square"></i>
        <span data-ar="ادعو أصدقاء" data-en="Invite">ادعو أصدقاء</span>
    </a>
    <a href="ana.html" class="nav-item">
        <i class="fa-regular fa-user"></i>
        <span data-ar="أنا" data-en="Me">أنا</span>
    </a>
</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCa3nVSth5Jhhuhvblw23w0uxzR1VJHLOo",
            authDomain: "yaqoout-b4c83.firebaseapp.com",
            databaseURL: "https://yaqoout-b4c83-default-rtdb.firebaseio.com",
            projectId: "yaqoout-b4c83",
            storageBucket: "yaqoout-b4c83.firebasestorage.app",
            messagingSenderId: "21558070357",
            appId: "1:21558070357:web:6237dcf59b162b5dae18dc"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        // 1. نظام التحميل اللحظي (السرعة الصاروخية)
        function getInstantCode() {
            let code = localStorage.getItem('ed_user_invite_code');
            if (!code) {
                code = "ED" + Math.floor(10000 + Math.random() * 90000);
                localStorage.setItem('ed_user_invite_code', code);
            }
            return code;
        }

        function renderInviteData(inviteCode) {
            let baseRegisterUrl = `https://starlit-crepe-695886.netlify.app/?invite=${inviteCode}`;

            document.getElementById('code-text').innerText = inviteCode;
            document.getElementById('link-text').innerText = baseRegisterUrl;

            let qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=${encodeURIComponent(baseRegisterUrl)}&color=0-0-0`;
            document.getElementById('qr-image').src = qrImgUrl;
        }

        // عرض البيانات فور فتح الصفحة بـ 0.001 ثانية
        let instantCode = getInstantCode();
        renderInviteData(instantCode);

        // 2. المزامنة الذكية مع الفايربيس (تعمل بصمت في الخلفية)
        auth.onAuthStateChanged((user) => {
            if (user) {
                database.ref(`users/${user.uid}/inviteCode`).once('value').then((snapshot) => {
                    let serverCode = snapshot.val();
                    if (!serverCode) {
                        database.ref(`users/${user.uid}/inviteCode`).set(instantCode);
                    } else if (serverCode !== instantCode) {
                        localStorage.setItem('ed_user_invite_code', serverCode);
                        renderInviteData(serverCode);
                    }
                });
            }
        });
        
        // دالة فحص الإشعارات والعمولات
        window.checkCommissions = function() {
            // محاكاة تنبيه إشعار لا يوجد رصيد حالي، ويمكن ربطها لاحقاً ببيانات الفايربيس
            showToast("🔔 لا توجد إشعارات عمولات جديدة حالياً.");
        }

        // دالة النسخ اللحظية
        window.copyContent = function(elementId, successMessage) {
            let textToCopy = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast(successMessage);
            }).catch(err => {
                let textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast(successMessage);
            });
        }

        window.showToast = function(message) {
            let toast = document.getElementById('copy-toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        // المشاركة المباشرة (تعمل عند النقر على إرسال الرابط أو أيقونات المشاركة بالأسفل)
        window.shareTo = function(platform) {
            let inviteUrl = document.getElementById('link-text').innerText;
            let shareText = encodeURIComponent("انضم إليّ على منصة ED-Ai وابدأ التداول الكمي الذكي الآن! رصيد مكافآت بانتظارك: " + inviteUrl);
            let targetUrl = "";

            if(platform === 'twitter') targetUrl = `https://twitter.com/intent/tweet?text=${shareText}`;
            if(platform === 'facebook') targetUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(inviteUrl)}`;
            if(platform === 'telegram') targetUrl = `https://t.me/share/url?url=${encodeURIComponent(inviteUrl)}&text=${shareText}`;
            if(platform === 'whatsapp') targetUrl = `https://api.whatsapp.com/send?text=${shareText}`;
            
            if(targetUrl !== "") {
                window.open(targetUrl, '_blank');
            }
        }
    </script>
</body>
</html>
