<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tadawulx - التحديد الكمي الاحترافي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #0b0e11; color: #ffffff; user-select: none; padding-bottom: 80px; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background-color: #181a20; border-bottom: 1px solid #2b3139; position: sticky; top: 0; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 16px; }
        .logo img { width: 30px; height: 30px; border-radius: 50%; }
        .icons { font-size: 18px; color: #848e9c; display: flex; gap: 15px; }

        .neon-stats-card { background: linear-gradient(135deg, #00ffcc 0%, #00ff66 100%); margin: 15px; border-radius: 20px; padding: 15px; color: #000; box-shadow: 0 4px 25px rgba(0, 255, 204, 0.4); }
        .neon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; margin-bottom: 15px; }
        .neon-box .lbl { font-size: 11px; font-weight: bold; color: #1e2329; opacity: 0.8; }
        .neon-box .val { font-size: 14px; font-weight: 900; }
        .neon-divider { height: 1px; background: rgba(0,0,0,0.15); margin: 5px 0 12px; }
        .neon-four-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; text-align: center; }

        .reset-timer-bar { text-align: center; font-size: 13px; color: #848e9c; margin: 10px 0; }
        .reset-timer-bar span { color: #fcd535; font-weight: bold; font-size: 15px; }

        .trading-graphic-area { 
            position: relative; height: 260px; margin: 15px; border-radius: 12px; 
            background: #0d1015; border: 1px solid #2b3139; display: flex; justify-content: center; align-items: center; overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
        }

        .cyber-grid {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(43, 49, 57, 0.4) 1px, transparent 1px), linear-gradient(90deg, rgba(43, 49, 57, 0.4) 1px, transparent 1px);
            background-size: 30px 30px; transform: perspective(500px) rotateX(60deg); transform-origin: bottom; opacity: 0.5; z-index: 1;
        }

        .scene { width: 120px; height: 120px; perspective: 800px; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .quantum-cube { width: 70px; height: 70px; position: relative; transform-style: preserve-3d; animation: slowSpin3D 8s infinite linear; }
        .cube-face {
            position: absolute; width: 70px; height: 70px; background: rgba(255, 215, 0, 0.1); border: 2px solid #ffd700;
            box-shadow: inset 0 0 15px rgba(255, 215, 0, 0.4); display: flex; justify-content: center; align-items: center;
            font-size: 20px; color: rgba(255, 215, 0, 0.8); transition: all 0.5s ease;
        }

        .face-front  { transform: rotateY(  0deg) translateZ(35px); }
        .face-back   { transform: rotateY(180deg) translateZ(35px); }
        .face-right  { transform: rotateY( 90deg) translateZ(35px); }
        .face-left   { transform: rotateY(-90deg) translateZ(35px); }
        .face-top    { transform: rotateX( 90deg) translateZ(35px); }
        .face-bottom { transform: rotateX(-90deg) translateZ(35px); }

        .cube-core {
            position: absolute; width: 30px; height: 30px; top: 20px; left: 20px; background: #ffffff;
            box-shadow: 0 0 20px #ffd700, 0 0 10px #ffffff; transform: rotateX(45deg) rotateY(45deg);
            transition: all 0.5s ease; animation: pulseCore 2s infinite alternate;
        }

        @keyframes slowSpin3D { 0% { transform: rotateX(-20deg) rotateY(0deg); } 100% { transform: rotateX(-20deg) rotateY(360deg); } }
        @keyframes pulseCore { 0% { transform: scale(1); box-shadow: 0 0 20px #ffd700; } 100% { transform: scale(1.3); box-shadow: 0 0 40px #ffd700, 0 0 15px #fff; } }

        .floating-platform { position: absolute; background: rgba(24, 26, 32, 0.9); border: 1px solid #2b3139; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 15; transition: all 0.3s; }
        .p-binance { top: 30px; right: 5%; color: #fcd535; animation: float1 4s ease-in-out infinite; }
        .p-okx { top: 40px; left: 5%; color: #fff; animation: float2 5s ease-in-out infinite; }
        .p-usdt { bottom: 40px; left: 10%; color: #26a17b; animation: float1 4.5s ease-in-out infinite; }
        .p-bitcoin { bottom: 30px; right: 10%; color: #f2a900; animation: float2 5.5s ease-in-out infinite; }

        @keyframes float1 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes float2 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }

        .trading-graphic-area.processing .quantum-cube { animation: fastSpin3D 0.5s infinite linear; }
        .trading-graphic-area.processing .cube-face { border-color: #00ffcc; background: rgba(0, 255, 204, 0.2); color: #00ffcc; }
        .trading-graphic-area.processing .face-front  { transform: rotateY(0deg) translateZ(55px); }
        .trading-graphic-area.processing .face-back   { transform: rotateY(180deg) translateZ(55px); }
        .trading-graphic-area.processing .face-right  { transform: rotateY(90deg) translateZ(55px); }
        .trading-graphic-area.processing .face-left   { transform: rotateY(-90deg) translateZ(55px); }
        .trading-graphic-area.processing .face-top    { transform: rotateX(90deg) translateZ(55px); }
        .trading-graphic-area.processing .face-bottom { transform: rotateX(-90deg) translateZ(55px); }
        .trading-graphic-area.processing .cube-core { background: #00ffcc; box-shadow: 0 0 60px #00ffcc, 0 0 20px #ffffff; transform: scale(1.5); }
        
        @keyframes fastSpin3D { 0% { transform: rotateX(-20deg) rotateY(0deg); } 100% { transform: rotateX(340deg) rotateY(360deg); } }

        .data-stream { position: absolute; width: 4px; height: 50px; bottom: -60px; z-index: 12; animation: shootUp 0.4s ease-in forwards; }
        @keyframes shootUp { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-300px); opacity: 0; } }

        .fingerprint-btn-container { display: flex; justify-content: center; margin: 10px 0 20px; }
        .fingerprint-btn { background: linear-gradient(145deg, #1e2329, #14171a); border: 2px solid #2b3139; border-radius: 35px; padding: 15px 30px; display: flex; align-items: center; gap: 12px; cursor: pointer; width: 85%; justify-content: center; transition: all 0.3s; }
        .fingerprint-btn.running { border-color: #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.4); pointer-events: none; }
        .fingerprint-btn.running i { color: #ff3366; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.25); } }

        .vip-scroll-list { padding: 0 15px 20px; display: flex; flex-direction: column; gap: 15px; }
        .modern-vip-card { background: linear-gradient(180deg, #1e2329 0%, #14171a 100%); border: 1px solid #2b3139; border-radius: 12px; padding: 16px; position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: all 0.3s; }
        .modern-vip-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #4facfe; }
        .modern-vip-card.active { border-color: #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.15); }
        .modern-vip-card.active::before { background: #00ffcc !important; }
        .modern-vip-card.vip0::before { background: #848e9c; }
        .modern-vip-card.vip1::before { background: #00f646; } 
        .modern-vip-card.vip2::before { background: #f6a100; } 
        .modern-vip-card.vip3::before { background: #f6cd00; } 
        .modern-vip-card.vip4::before { background: #ff3366; } 
        .modern-vip-card.vip5::before { background: #4facfe; } 
        .modern-vip-card.vip6::before { background: #b026ff; } 
        .modern-vip-card.vip7::before { background: #ff0000; } 

        .vip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #2b3139; padding-bottom: 12px; }
        .vip-title { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: bold; }
        .vip-grid-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .v-stat-box { display: flex; flex-direction: column; gap: 4px; }
        .v-stat-box .lbl { font-size: 11px; color: #848e9c; }
        .v-stat-box .val { font-size: 14px; font-weight: bold; color: #fff; }
        .v-stat-box .val.highlight { color: #00ffcc; font-size: 16px; }

        .unlock-btn { background: linear-gradient(90deg, #fcd535, #eec100); color: #000; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .current-status-lbl { color: #00ffcc; font-size: 11px; font-weight: bold; background: rgba(0,255,204,0.1); padding: 5px 10px; border-radius: 6px; }
/* ---------------- القائمة السفلية ---------------- */
.bottom-nav { 
    position: fixed; 
    bottom: 0; 
    left: 0; 
    width: 100%; 
    background-color: #000000; 
    display: flex; 
    justify-content: space-around;

    border-top: 1px solid #2b3139; 
    z-index: 100;

}
.nav-item { display: flex; flex-direction: column; align-items: center; color: #848e9c; font-size: 11px; gap: 6px; font-weight: bold; text-decoration: none; }
.nav-item.active { color: #fcd535; }
.nav-item i { font-size: 20px; }

        .toast-popup { position: fixed; top: -60px; left: 50%; transform: translateX(-50%); background: #02c076; color: #fff; padding: 12px 25px; border-radius: 8px; font-size: 13px; font-weight: bold; z-index: 2000; transition: top 0.3s; width: 85%; text-align: center; max-width: 340px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="toast-popup" id="toastNotifier">تم بنجاح!</div>

    <div class="header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <i class="fa-solid fa-chevron-right" style="font-size: 20px; color: #fcd535; cursor: pointer;" onclick="window.history.back()"></i>
            <div class="logo">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Logo">
                <span>Tadawulx</span>
            </div>
        </div>
        <div class="icons"><i class="fa-solid fa-globe"></i></div>
    </div>

    <div id="quantification-screen" class="app-screen active">
        <div class="neon-stats-card">
            <div class="neon-grid">
                <div class="neon-box"><span class="lbl">أيام العقد</span><span class="val" id="stat-days">0</span></div>
                <div class="neon-box"><span class="lbl">نسبة الربح</span><span class="val" id="stat-daily-percent">-</span></div>
                <div class="neon-box"><span class="lbl">المستوى الحالي</span><span class="val" id="card-current-level">-</span></div>
            </div>
            <div class="neon-divider"></div>
            <div class="neon-four-grid">
                <div class="neon-box"><span class="lbl">إجمالي الإيرادات</span><span class="val" id="stat-total-rev">0.00</span></div>
                <div class="neon-box"><span class="lbl">أرباح اليوم</span><span class="val" id="stat-today-rev">0.00</span></div>
                <div class="neon-box"><span class="lbl">أرباح الفريق</span><span class="val" id="stat-team-rev">0.00</span></div>
                <div class="neon-box"><span class="lbl">رصيد المحفظة</span><span class="val" id="stat-wallet-bal" style="font-weight:bold;">0.00</span></div>
            </div>
        </div>

        <div class="reset-timer-bar">إعادة المهام بعد: <span id="clock-countdown">00:00:00</span></div>

        <div class="trading-graphic-area" id="tradingGraphic">
            <div class="cyber-grid"></div>
            <div class="scene">
                <div class="quantum-cube" id="quantumCube">
                    <div class="cube-core"></div>
                    <div class="cube-face face-front"><i class="fa-solid fa-bolt"></i></div>
                    <div class="cube-face face-back"><i class="fa-solid fa-bolt"></i></div>
                    <div class="cube-face face-right"><i class="fa-solid fa-chart-line"></i></div>
                    <div class="cube-face face-left"><i class="fa-solid fa-chart-line"></i></div>
                    <div class="cube-face face-top"></div>
                    <div class="cube-face face-bottom"></div>
                </div>
            </div>
            <div class="floating-platform p-binance"><i class="fa-brands fa-bitcoin"></i> BINANCE</div>
            <div class="floating-platform p-okx"><i class="fa-solid fa-layer-group"></i> OKX</div>
            <div class="floating-platform p-usdt"><i class="fa-solid fa-dollar-sign"></i> USDT</div>
            <div class="floating-platform p-bitcoin"><i class="fa-brands fa-ethereum"></i> ETH</div>
        </div>

        <div class="fingerprint-btn-container">
            <div class="fingerprint-btn" id="fingerprintBtn" onclick="triggerQuantificationProcessing()">
                <i class="fa-solid fa-fingerprint" style="font-size:24px; color:#ffd700;"></i>
                <span id="fp-btn-text">انقر للبدء (5 ثوانٍ)</span>
                <div id="fp-btn-counter" style="color:#fcd535; font-weight:bold; margin-right:auto;">3 / 3</div>
            </div>
        </div>

        <div class="vip-scroll-list" id="vipListContainer"></div>
    </div>

    <a href="home.html" class="nav-item">
        <i class="fa-solid fa-house"></i>
        <span data-ar="بيت" data-en="Home">بيت</span>

        <i class="fa-regular fa-user"></i>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // إعدادات الفايربيز
        const firebaseConfig = {
            apiKey: "AIzaSyCa3nVSth5Jhhuhvblw23w0uxzR1VJHLOo",
            authDomain: "yaqoout-b4c83.firebaseapp.com",
            projectId: "yaqoout-b4c83",
            storageBucket: "yaqoout-b4c83.firebasestorage.app",
            messagingSenderId: "21558070357",
            appId: "1:21558070357:web:6237dcf59b162b5dae18dc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        const vipLevels = [
            { id: 0, name: "الباقة المجانية", price: 0, dailyProfit: 0.05, teamBonusRate: 0.00, contractDays: 260, profitPercent: "0.5%", iconColor: "#848e9c" },
            { id: 1, name: "VIP 1", price: 10, dailyProfit: 0.50, teamBonusRate: 0.02, contractDays: 260, profitPercent: "5%", iconColor: "#00f646" }, 
            { id: 2, name: "VIP 2", price: 25, dailyProfit: 1.50, teamBonusRate: 0.04, contractDays: 260, profitPercent: "6%", iconColor: "#f6a100" }, 
            { id: 3, name: "VIP 3", price: 50, dailyProfit: 3.50, teamBonusRate: 0.06, contractDays: 260, profitPercent: "7%", iconColor: "#f6cd00" }, 
            { id: 4, name: "VIP 4", price: 75, dailyProfit: 5.60, teamBonusRate: 0.08, contractDays: 260, profitPercent: "8%", iconColor: "#ff3366" },
            { id: 5, name: "VIP 5", price: 100, dailyProfit: 9.00, teamBonusRate: 0.10, contractDays: 260, profitPercent: "9%", iconColor: "#4facfe" },
            { id: 6, name: "VIP 6", price: 150, dailyProfit: 15.00, teamBonusRate: 0.12, contractDays: 260, profitPercent: "10%", iconColor: "#b026ff" },
            { id: 7, name: "VIP 7", price: 300, dailyProfit: 36.00, teamBonusRate: 0.14, contractDays: 260, profitPercent: "12%", iconColor: "#ff0000" }
        ];

        let localUserData = {
            balance: 0.00, activeVipId: 0, clicksDoneToday: 0,
            todayRevenue: 0.00, totalRevenue: 0.00, teamRevenue: 0.00,
            isLockedFor24h: false, lastCompletionTime: null, parentId: null, referredByUid: null
        };

        let isProcessing = false;
        let dataStreamInterval;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) { 
                        let data = docSnap.data();
                        localUserData.balance = parseFloat(data.balance || 0);
                        localUserData.activeVipId = data.activeVipId || 0;
                        localUserData.clicksDoneToday = data.clicksDoneToday || 0;
                        localUserData.todayRevenue = parseFloat(data.todayRevenue || 0);
                        localUserData.totalRevenue = parseFloat(data.totalRevenue || 0);
                        localUserData.teamRevenue = parseFloat(data.teamRevenue || data.totalTeamRewards || 0);
                        localUserData.isLockedFor24h = data.isLockedFor24h || false;
                        localUserData.lastCompletionTime = data.lastCompletionTime || null;
                        localUserData.parentId = data.parentId || null;
                        localUserData.referredByUid = data.referredByUid || null;
                        
                        renderVipCards();
                        updateUI();
                    }
                });
            } else {
                window.location.href = "login.html"; 
            }
        });

        window.triggerQuantificationProcessing = async function() {
            if (isProcessing || !currentUser) return;

            if (localUserData.isLockedFor24h || localUserData.clicksDoneToday >= 3) {
                showToast("لقد أكملت مهامك لليوم، انتظر العداد! ⏳", true);
                return;
            }

            isProcessing = true;
            let fpBtn = document.getElementById('fingerprintBtn');
            let fpText = document.getElementById('fp-btn-text');
            let graphicArea = document.getElementById('tradingGraphic');
            
            fpBtn.classList.add('running');
            graphicArea.classList.add('processing'); 
            
            dataStreamInterval = setInterval(() => {
                let stream = document.createElement('div');
                stream.className = 'data-stream';
                stream.style.left = Math.floor(Math.random() * 80 + 10) + '%';
                let color = Math.random() > 0.5 ? '#ffd700' : '#00ffcc';
                stream.style.background = color;
                stream.style.boxShadow = `0 0 10px ${color}`;
                graphicArea.appendChild(stream);
                setTimeout(() => stream.remove(), 400); 
            }, 60);
            
            let countdown = 5;
            fpText.innerText = `جاري المعالجة... ${countdown}ث`;

            let timer = setInterval(async () => {
                countdown--;
                if (countdown > 0) {
                    fpText.innerText = `جاري المعالجة... ${countdown}ث`;
                } else {
                    clearInterval(timer);
                    clearInterval(dataStreamInterval);
                    fpBtn.classList.remove('running');
                    graphicArea.classList.remove('processing');
                    document.querySelectorAll('.data-stream').forEach(c => c.remove());
                    
                    try {
                        const userRef = doc(db, "users", currentUser.uid);
                        let currentStatus = 0;
                        let profitEarned = 0;

                        await runTransaction(db, async (transaction) => {
                            const sfDoc = await transaction.get(userRef);
                            if (!sfDoc.exists()) throw "المستخدم غير موجود بالبيانات!";
                            
                            let data = sfDoc.data();
                            let dbClicks = data.clicksDoneToday || 0;
                            let dbLocked = data.isLockedFor24h || false;
                            
                            if (dbLocked || dbClicks >= 3) {
                                throw "محاولة تلاعب: لقد أكملت مهامك مسبقاً!";
                            }

                            dbClicks += 1;
                            currentStatus = dbClicks;
                            let updates = { clicksDoneToday: dbClicks };

                            if (dbClicks === 3) {
                                let currentVipId = data.activeVipId || 0;
                                let currentVip = vipLevels.find(v => v.id === currentVipId) || vipLevels[0];
                                
                                profitEarned = currentVip.dailyProfit;
                                let newBalance = parseFloat(data.balance || 0) + profitEarned;
                                let newTotalRev = parseFloat(data.totalRevenue || 0) + profitEarned;
                                
                                updates.balance = newBalance;
                                updates.todayRevenue = profitEarned;
                                updates.totalRevenue = newTotalRev;
                                updates.isLockedFor24h = true;
                                updates.lastCompletionTime = Date.now();

                                // مكافأة الفريق للمهام
                                let pId = data.parentId || data.referredByUid || null;
                                if (pId && currentVip.teamBonusRate > 0) {
                                    const parentRef = doc(db, "users", pId);
                                    const pDoc = await transaction.get(parentRef);
                                    if (pDoc.exists()) {
                                        let parentData = pDoc.data();
                                        let teamBonus = profitEarned * currentVip.teamBonusRate;
                                        transaction.update(parentRef, {
                                            balance: parseFloat(parentData.balance || 0) + teamBonus,
                                            teamRevenue: parseFloat(parentData.teamRevenue || parentData.totalTeamRewards || 0) + teamBonus,
                                            totalTeamRewards: parseFloat(parentData.totalTeamRewards || parentData.teamRevenue || 0) + teamBonus
                                        });
                                    }
                                }
                            }
                            transaction.update(userRef, updates);
                        });

                        if (currentStatus === 1) {
                            showToast("👍 تم إنهاء الدورة الأولى! اضغط مجدداً للثانية.");
                        } else if (currentStatus === 2) {
                            showToast("👍 تم إنهاء الدورة الثانية! اضغط مجدداً للأخيرة.");
                        } else if (currentStatus === 3) {
                            showToast(`✅ تم إكمال المهمة بنجاح! حصلت على $${profitEarned.toFixed(2)}`);
                        }

                    } catch (error) {
                        showToast(`❌ ${error}`, true);
                    } finally {
                        isProcessing = false;
                    }
                }
            }, 1000);
        };

        // 💰 دالة شراء الـ VIP المحدثة بنظام مكافآت الإحالة (5%)
        window.buyVipLevel = async function(id, price) {
            if (!currentUser) return;
            try {
                const userRef = doc(db, "users", currentUser.uid);
                
                await runTransaction(db, async (transaction) => {
                    // القراءة الأولى: حساب المشترك
                    const sfDoc = await transaction.get(userRef);
                    if (!sfDoc.exists()) throw "المستخدم غير موجود!";
                    
                    let data = sfDoc.data();
                    let currentBal = parseFloat(data.balance || 0);

                    if (currentBal < price) {
                        throw `رصيدك الفعلي غير كافٍ للترقية! تحتاج $${price}`;
                    }

                    // البحث عن الداعي (القراءة الثانية)
                    let inviterUid = data.referredByUid || data.parentId; 
                    let inviterRef = null;
                    let inviterDoc = null;
                    
                    if (inviterUid && price > 0) {
                        inviterRef = doc(db, "users", inviterUid);
                        inviterDoc = await transaction.get(inviterRef);
                    }

                    // 1. خصم الرصيد وتحديث باقة المشترك
                    transaction.update(userRef, {
                        balance: currentBal - price,
                        activeVipId: id,
                        clicksDoneToday: 0,
                        isLockedFor24h: false,
                        lastCompletionTime: null
                    });

                    // 2. منح 5% للداعي (إن وجد)
                    if (inviterDoc && inviterDoc.exists()) {
                        let inviterData = inviterDoc.data();
                        let inviterBal = parseFloat(inviterData.balance || 0);
                        let inviterTeamRev = parseFloat(inviterData.totalTeamRewards || inviterData.teamRevenue || 0);
                        
                        let bonus = price * 0.05; // حساب الـ 5%
                        
                        transaction.update(inviterRef, {
                            balance: inviterBal + bonus,
                            totalTeamRewards: inviterTeamRev + bonus,
                            teamRevenue: inviterTeamRev + bonus
                        });
                    }
                });
                
                showToast("🎉 تم تفعيل الخطة بنجاح وتم صرف عمولة الدعوة!");
            } catch (error) {
                showToast(`❌ ${error}`, true);
            }
        };

        window.showToast = function(text, isError = false) {
            let toast = document.getElementById('toastNotifier');
            toast.innerText = text;
            toast.style.background = isError ? '#f6465d' : '#02c076';
            toast.style.top = "20px";
            setTimeout(() => { toast.style.top = "-60px"; }, 3000);
        };

        function updateUI() {
            let currentVip = vipLevels.find(v => v.id === localUserData.activeVipId) || vipLevels[0];
            
            document.getElementById('card-current-level').innerText = currentVip.name;
            document.getElementById('stat-daily-percent').innerText = currentVip.profitPercent;
            document.getElementById('stat-days').innerText = currentVip.contractDays;
            
            document.getElementById('stat-wallet-bal').innerText = (Number(localUserData.balance) || 0).toFixed(2);
            document.getElementById('stat-today-rev').innerText = (Number(localUserData.todayRevenue) || 0).toFixed(2);
            document.getElementById('stat-total-rev').innerText = (Number(localUserData.totalRevenue) || 0).toFixed(2);
            document.getElementById('stat-team-rev').innerText = (Number(localUserData.teamRevenue) || 0).toFixed(2);

            let remainingClicks = localUserData.isLockedFor24h ? 0 : Math.max(0, 3 - (Number(localUserData.clicksDoneToday) || 0));
            document.getElementById('fp-btn-counter').innerText = `${remainingClicks} / 3`;
            
            let fpBtn = document.getElementById('fingerprintBtn');
            let fpText = document.getElementById('fp-btn-text');
            
            if (localUserData.isLockedFor24h) {
                fpBtn.style.opacity = "0.5";
                fpText.innerText = "اكتملت مهام اليوم بنجاح!";
            } else if (localUserData.clicksDoneToday === 1) {
                fpBtn.style.opacity = "1";
                fpText.innerText = "انقر للبصمة الثانية";
            } else if (localUserData.clicksDoneToday === 2) {
                fpBtn.style.opacity = "1";
                fpText.innerText = "انقر للبصمة الثالثة والأخيرة";
            } else {
                fpBtn.style.opacity = "1";
                fpText.innerText = "انقر للبدء (5 ثوانٍ)";
            }
        }

        function renderVipCards() {
            let container = document.getElementById('vipListContainer');
            if (!container) return;
            container.innerHTML = "";
            
            vipLevels.forEach(vip => {
                let isActive = localUserData.activeVipId === vip.id;
                let card = document.createElement('div');
                card.className = `modern-vip-card vip${vip.id} ${isActive ? 'active' : ''}`;
                
                let btnHtml = isActive ? '<span class="current-status-lbl">المستوى الحالي</span>' : 
                             (vip.price === 0 ? `<button class="unlock-btn" onclick="buyVipLevel(${vip.id}, 0)">تفعيل مجاني</button>` : 
                             `<button class="unlock-btn" onclick="buyVipLevel(${vip.id}, ${vip.price})">فتح بـ $${vip.price}</button>`);

                card.innerHTML = `
                    <div class="vip-header">
                        <div class="vip-title">
                            <i class="fa-solid fa-crown" style="color:${vip.iconColor};"></i>
                            <span style="color:${vip.iconColor};">${vip.name}</span>
                        </div>
                        ${btnHtml}
                    </div>
                    <div class="vip-grid-stats">
                        <div class="v-stat-box">
                            <span class="lbl">الربح اليومي ($)</span>
                            <span class="val highlight">${vip.dailyProfit.toFixed(2)} USDT</span>
                        </div>
                        <div class="v-stat-box">
                            <span class="lbl">نسبة الربح(%)</span>
                            <span class="val">${vip.profitPercent}</span>
                        </div>
                        <div class="v-stat-box">
                            <span class="lbl">فترة الصلاحية</span>
                            <span class="val">${vip.contractDays} يوماً</span>
                        </div>
                        <div class="v-stat-box">
                            <span class="lbl">المهام اليومية</span>
                            <span class="val">3 قياسات يومية</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        setInterval(() => {
            if (!localUserData.lastCompletionTime || !localUserData.isLockedFor24h) {
                document.getElementById('clock-countdown').innerText = "00:00:00";
                return;
            }
            let diff = (localUserData.lastCompletionTime + 86400000) - Date.now();
            
            if (diff <= 0) {
                if(currentUser && localUserData.isLockedFor24h) {
                    localUserData.isLockedFor24h = false; 
                    const userRef = doc(db, "users", currentUser.uid);
                    runTransaction(db, async (transaction) => {
                        const docSnap = await transaction.get(userRef);
                        if(docSnap.exists()){
                            let d = docSnap.data();
                            if(d.isLockedFor24h && (Date.now() - d.lastCompletionTime) >= 86400000){
                                transaction.update(userRef, {
                                    clicksDoneToday: 0,
                                    todayRevenue: 0,
                                    isLockedFor24h: false,
                                    lastCompletionTime: null
                                });
                            }
                        }
                    }).catch(e => console.log(e));
                }
                document.getElementById('clock-countdown').innerText = "00:00:00";
                return;
            }
            
            let h = Math.floor(diff / 3600000);
            let m = Math.floor((diff % 3600000) / 60000);
            let s = Math.floor((diff % 60000) / 1000);
            document.getElementById('clock-countdown').innerText = `${h < 10 ? '0' + h : h}:${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        }, 1000);
    </script>


</body>
</html>
