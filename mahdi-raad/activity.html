<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tadawulx - النشاط والإشعارات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000000; color: #ffffff; display: flex; justify-content: center; min-height: 100vh; user-select: none; }
        .app-container { width: 100%; max-width: 400px; background-color: #000000; position: relative; display: flex; flex-direction: column; padding-bottom: 30px; }
        
        /* الهيدر العلوي */
        .top-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; font-size: 16px; font-weight: bold; border-bottom: 1px solid #1e2329; background-color: #141517; position: sticky; top: 0; z-index: 10; }
        .top-header i { cursor: pointer; font-size: 18px; }

        /* حاوية الإشعارات والأنشطة */
        .notifications-container { padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        /* الكارت الموحد للإشعار */
        .notification-card { background-color: #141517; border: 1px solid #1e2329; border-radius: 12px; padding: 15px; display: flex; gap: 15px; align-items: flex-start; transition: transform 0.2s; }

        /* تصميم الدائرة الملونة للأيقونات */
        .notif-icon-box { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 16px; flex-shrink: 0; }

        /* محتوى تفاصيل الإشعار */
        .notif-details { display: flex; flex-direction: column; gap: 5px; width: 100%; }
        .notif-header { display: flex; justify-content: space-between; align-items: center; }
        .notif-title { font-size: 14px; font-weight: bold; color: #ffffff; }

        /* الألوان الخاصة بكل حالة للطلبات */
        .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .status-success { background-color: rgba(14, 203, 129, 0.15); color: #0ecb81; }
        .status-pending { background-color: rgba(252, 213, 53, 0.15); color: #fcd535; }
        .status-rejected { background-color: rgba(246, 70, 93, 0.15); color: #f6465d; }

        .notif-message { font-size: 13px; color: #848e9c; line-height: 1.5; }
        .notif-time { font-size: 11px; color: #5e6673; display: flex; align-items: center; gap: 5px; margin-top: 2px; }

        /* واجهة فارغ */
        .empty-state { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; color: #848e9c; font-size: 14px; }
        .empty-state img { width: 70px; opacity: 0.5; margin-bottom: 15px; }
        
        /* مؤشر التحميل */
        .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px 0; color: #fcd535; font-size: 14px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-header">
            <i class="fa-solid fa-chevron-right" onclick="history.back()"></i>
            <span>مركز الأنشطة والإشعارات</span>
            <div></div>
        </div>

        <div class="loading-state" id="loading-activities">
            <i class="fa-solid fa-spinner fa-spin" style="font-size: 24px; margin-bottom: 10px;"></i>
            <span>جاري المزامنة مع الخادم...</span>
        </div>

        <div class="notifications-container" id="notifications-list" style="display: none;"></div>

        <div class="empty-state" id="empty-activities">
            <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" alt="Empty">
            <span>لا توجد أنشطة أو إشعارات حالياً</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa3nVSth5Jhhuhvblw23w0uxzR1VJHLOo",
            authDomain: "yaqoout-b4c83.firebaseapp.com",
            projectId: "yaqoout-b4c83",
            storageBucket: "yaqoout-b4c83.firebasestorage.app",
            messagingSenderId: "21558070357",
            appId: "1:21558070357:web:6237dcf59b162b5dae18dc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allUserActivities = []; 
        let depositsLoaded = false;
        let withdrawsLoaded = false;

        // دالة عرض وتحديث الواجهة
        function renderActivities() {
            const container = document.getElementById('notifications-list');
            const emptyView = document.getElementById('empty-activities');
            const loadingView = document.getElementById('loading-activities');

            // ترتيب العمليات من الأحدث للأقدم
            allUserActivities.sort((a, b) => b.sortTime - a.sortTime);

            loadingView.style.display = 'none';
            container.innerHTML = "";

            if (allUserActivities.length === 0) {
                emptyView.style.display = 'flex';
                container.style.display = 'none';
                return;
            }

            emptyView.style.display = 'none';
            container.style.display = 'flex';

            allUserActivities.forEach(item => {
                let card = document.createElement('div');
                card.className = 'notification-card';
                
                let iconClass = "fa-solid fa-bell";
                let iconBg = "rgba(255, 255, 255, 0.1)";
                let iconColor = "#ffffff";
                let badgeClass = "status-pending";
                
                if (item.status === 'approved') {
                    iconClass = item.type === 'deposit' ? "fa-solid fa-wallet" : "fa-solid fa-money-bill-transfer";
                    iconColor = "#0ecb81";
                    iconBg = "rgba(14, 203, 129, 0.1)";
                    badgeClass = "status-success";
                } else if (item.status === 'pending') {
                    iconClass = "fa-solid fa-clock";
                    iconColor = "#fcd535";
                    iconBg = "rgba(252, 213, 53, 0.1)";
                    badgeClass = "status-pending";
                } else if (item.status === 'rejected') {
                    iconClass = "fa-solid fa-circle-xmark";
                    iconColor = "#f6465d";
                    iconBg = "rgba(246, 70, 93, 0.1)";
                    badgeClass = "status-rejected";
                }

                // تم تصحيح الخطأ هنا (إغلاق الـ Template Literal بشكل صحيح)
                card.innerHTML = `
                    <div class="notif-icon-box" style="background-color: ${iconBg}; color: ${iconColor};">
                        <i class="${iconClass}"></i>
                    </div>
                    <div class="notif-details">
                        <div class="notif-header">
                            <span class="notif-title">${item.title}</span>
                            <span class="status-badge ${badgeClass}">${item.statusText}</span>
                        </div>
                        <span class="notif-message">${item.message}</span>
                        <div class="notif-time">
                            <i class="fa-regular fa-clock"></i>
                            <span style="direction: ltr;">${item.displayTime}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // الاستماع لحالة الدخول وجلب البيانات الحقيقية
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // 1. جلب الإيداعات
                const qDep = query(collection(db, "deposits"), where("userId", "==", user.uid));
                onSnapshot(qDep, (snapshot) => {
                    allUserActivities = allUserActivities.filter(a => a.type !== 'deposit');
                    
                    snapshot.forEach((docSnap) => {
                        let data = docSnap.data();
                        let timeObj = data.timestamp ? new Date(data.timestamp.seconds * 1000) : new Date();
                        
                        let titleText = "طلب إيداع رصيد";
                        let statusTxt = "قيد المعالجة";
                        // تم تصحيح الخطأ هنا (إضافة الـ backticks)
                        let msgText = `جاري مراجعة طلب إيداعك بقيمة ${data.amount} USDT من قبل النظام.`;
                        
                        if(data.status === 'approved') {
                            titleText = "إيداع مكتمل"; statusTxt = "مكتمل";
                            msgText = `تم تأكيد عملية شحن حسابك بمبلغ ${data.amount} USDT بنجاح.`;
                        } else if(data.status === 'rejected') {
                            titleText = "إيداع مرفوض"; statusTxt = "مرفوض";
                            msgText = `تم رفض طلب الإيداع بقيمة ${data.amount} USDT، يرجى مراجعة الدعم.`;
                        }

                        allUserActivities.push({
                            id: docSnap.id,
                            type: 'deposit',
                            amount: data.amount,
                            status: data.status,
                            title: titleText,
                            statusText: statusTxt,
                            message: msgText,
                            sortTime: timeObj.getTime(),
                            displayTime: timeObj.toLocaleString('ar-EG', {hour12: true, hour: '2-digit', minute:'2-digit', year:'numeric', month:'2-digit', day:'2-digit'})
                        });
                    });
                    depositsLoaded = true;
                    if(withdrawsLoaded) renderActivities();
                });

                // 2. جلب السحوبات
                const qWith = query(collection(db, "withdraws"), where("userId", "==", user.uid));
                onSnapshot(qWith, (snapshot) => {
                    allUserActivities = allUserActivities.filter(a => a.type !== 'withdraw');
                    
                    snapshot.forEach((docSnap) => {
                        let data = docSnap.data();
                        let timeObj = data.timestamp ? new Date(data.timestamp.seconds * 1000) : new Date();
                        
                        let titleText = "طلب سحب رصيد";
                        let statusTxt = "قيد المعالجة";
                        // تم تصحيح الخطأ هنا (إضافة الـ backticks)
                        let msgText = `جاري مراجعة طلب السحب الخاص بك بقيمة ${data.amount} USDT.`;
                        
                        if(data.status === 'approved') {
                            titleText = "سحب مكتمل"; statusTxt = "مكتمل";
                            msgText = `تمت الموافقة بنجاح على تحويل مبلغ ${data.amount} USDT إلى محفظتك.`;
                        } else if(data.status === 'rejected') {
                            titleText = "سحب مرفوض"; statusTxt = "مرفوض";
                            msgText = `تم رفض طلب سحب بقيمة ${data.amount} USDT، وتم إعادة الرصيد لحسابك.`;
                        }

                        allUserActivities.push({
                            id: docSnap.id,
                            type: 'withdraw',
                            amount: data.amount,
                            status: data.status,
                            title: titleText,
                            statusText: statusTxt,
                            message: msgText,
                            sortTime: timeObj.getTime(),
                            displayTime: timeObj.toLocaleString('ar-EG', {hour12: true, hour: '2-digit', minute:'2-digit', year:'numeric', month:'2-digit', day:'2-digit'})
                        });
                    });
                    withdrawsLoaded = true;
                    if(depositsLoaded) renderActivities();
                });

            } else {
                document.getElementById('loading-activities').style.display = 'none';
                document.getElementById('empty-activities').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
